version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - HOST=0.0.0.0
      - PORT=8000
      # Critical: DO NOT hardcode secrets in compose, inject via native environment wrapper (.env lookup)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALLOWED_ORIGINS=["http://localhost:5173", "http://your-production-domain.com"]
      - LOG_LEVEL=WARNING
      # Docker native binary path inherited from Dockerfile injection
      - RHUBARB_BINARY_PATH=/usr/local/bin/rhubarb
    restart: unless-stopped
    # Constrain metrics matching 2GB droplet explicitly preventing noisy neighbors
    deploy:
      resources:
        limits:
          memory: 1G

  # Frontend natively operates through build deployments typically,
  # but provided here to validate local full-stack test routines synchronously
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npx serve -s dist -l 5173"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
